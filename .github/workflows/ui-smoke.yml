name: ui-smoke

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ui-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ui-smoke:
    continue-on-error: true
    runs-on: macos-26
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26
        run: |
          sudo xcode-select -s /Applications/Xcode_26.app || sudo xcode-select -s /Applications/Xcode.app
          xcodebuild -version
          swift --version

      - name: Run UI smoke suite
        run: ./scripts/run_ui_smoke.sh
