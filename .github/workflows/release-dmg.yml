name: Build macOS DMG

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  build-macos:
    runs-on: macos-26
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26
        run: |
          sudo xcode-select -s /Applications/Xcode_26.app || sudo xcode-select -s /Applications/Xcode.app
          swift --version

      - name: Set version from tag
        if: github.event_name == 'release'
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          PLIST="OpenOats/Sources/OpenOats/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $VERSION" "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $VERSION" "$PLIST"
          echo "Set version to $VERSION"

      - name: Check for signing certificate
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
        run: |
          if [[ -n "$MACOS_CERTIFICATE" ]]; then
            echo "HAS_CERT=true" >> "$GITHUB_ENV"
          fi

      - name: Import signing certificate
        if: env.HAS_CERT == 'true'
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
        run: |
          CERT_FILE=$(mktemp /tmp/cert.XXXXXX.p12)
          KEYCHAIN_FILE="/tmp/build-$$-$(date +%s).keychain-db"
          KEYCHAIN_PWD=$(openssl rand -base64 32)

          echo "$MACOS_CERTIFICATE" | base64 --decode > "$CERT_FILE"

          curl -sL "https://www.apple.com/certificateauthority/DeveloperIDG2CA.cer" -o /tmp/DeveloperIDG2CA.cer

          security create-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_FILE"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_FILE"
          security unlock-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_FILE"

          security import /tmp/DeveloperIDG2CA.cer -k "$KEYCHAIN_FILE" -T /usr/bin/codesign
          security import "$CERT_FILE" -P "$MACOS_CERTIFICATE_PWD" -A -t cert -f pkcs12 -k "$KEYCHAIN_FILE"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PWD" "$KEYCHAIN_FILE"
          security list-keychains -d user -s "$KEYCHAIN_FILE" $(security list-keychains -d user | tr -d '"')

          rm -f "$CERT_FILE" /tmp/DeveloperIDG2CA.cer

          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_FILE" | grep "Developer ID Application" | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "CODESIGN_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"
          echo "KEYCHAIN_FILE=$KEYCHAIN_FILE" >> "$GITHUB_ENV"

      - name: Build .app
        env:
          CODESIGN_IDENTITY: ${{ env.CODESIGN_IDENTITY }}
        run: |
          chmod +x scripts/build_swift_app.sh
          ./scripts/build_swift_app.sh

      - name: Build DMG
        env:
          CODESIGN_IDENTITY: ${{ env.CODESIGN_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          chmod +x scripts/make_dmg.sh
          ./scripts/make_dmg.sh

      - name: Cleanup keychain
        if: always()
        run: |
          if [[ -n "${KEYCHAIN_FILE:-}" ]]; then
            security delete-keychain "$KEYCHAIN_FILE" 2>/dev/null || true
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenOats-dmg
          path: dist/OpenOats.dmg

      - name: Attach DMG to Release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload ${{ github.event.release.tag_name }} dist/OpenOats.dmg --clobber

      - name: Sign DMG and update appcast
        if: github.event_name == 'release'
        env:
          SPARKLE_EDDSA_KEY: ${{ secrets.SPARKLE_EDDSA_KEY }}
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          DMG_PATH="dist/OpenOats.dmg"

          # Extract sign_update from Sparkle build artifacts
          SIGN_UPDATE=$(find OpenOats/.build/artifacts/sparkle -name "sign_update" -type f 2>/dev/null | head -1)
          if [[ -z "$SIGN_UPDATE" ]]; then
            echo "Error: sign_update not found in Sparkle artifacts"
            exit 1
          fi
          chmod +x "$SIGN_UPDATE"

          # Sign the DMG with EdDSA
          SIGN_OUTPUT=$(echo "$SPARKLE_EDDSA_KEY" | "$SIGN_UPDATE" "$DMG_PATH" --ed-key-file /dev/stdin)
          ED_SIGNATURE=$(echo "$SIGN_OUTPUT" | sed -n 's/.*edSignature="\([^"]*\)".*/\1/p')
          DMG_LENGTH=$(echo "$SIGN_OUTPUT" | sed -n 's/.*length="\([^"]*\)".*/\1/p')

          if [[ -z "$ED_SIGNATURE" ]]; then
            echo "Error: Failed to extract EdDSA signature"
            echo "sign_update output: $SIGN_OUTPUT"
            exit 1
          fi

          echo "EdDSA signature: $ED_SIGNATURE"
          echo "DMG length: $DMG_LENGTH"

          DMG_URL="https://github.com/yazinsai/OpenOats/releases/download/${TAG}/OpenOats.dmg"
          PUB_DATE=$(date -u +"%a, %d %b %Y %H:%M:%S %z")

          # Clone gh-pages branch
          git clone --branch gh-pages --single-branch "https://x-access-token:${GH_TOKEN}@github.com/yazinsai/OpenOats.git" /tmp/gh-pages

          # Generate appcast.xml
          cat > /tmp/gh-pages/appcast.xml <<APPCAST_EOF
          <?xml version="1.0" encoding="utf-8"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle" xmlns:dc="http://purl.org/dc/elements/1.1/">
            <channel>
              <title>OpenOats Updates</title>
              <link>https://raw.githubusercontent.com/yazinsai/OpenOats/gh-pages/appcast.xml</link>
              <description>Most recent updates to OpenOats</description>
              <language>en</language>
              <item>
                <title>Version ${VERSION}</title>
                <pubDate>${PUB_DATE}</pubDate>
                <sparkle:version>${VERSION}</sparkle:version>
                <sparkle:shortVersionString>${VERSION}</sparkle:shortVersionString>
                <sparkle:minimumSystemVersion>15.0</sparkle:minimumSystemVersion>
                <enclosure url="${DMG_URL}"
                           sparkle:edSignature="${ED_SIGNATURE}"
                           length="${DMG_LENGTH}"
                           type="application/octet-stream" />
              </item>
            </channel>
          </rss>
          APPCAST_EOF

          # Remove leading whitespace from heredoc (macOS sed)
          sed -i '' 's/^          //' /tmp/gh-pages/appcast.xml

          cd /tmp/gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add appcast.xml
          git commit -m "Update appcast for ${VERSION}" || echo "No changes to commit"
          git push origin gh-pages

      - name: Update Homebrew cask
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          SHA256=$(shasum -a 256 dist/OpenOats.dmg | awk '{print $1}')
          REPO_URL="https://x-access-token:${GH_TOKEN}@github.com/yazinsai/OpenOats.git"

          git clone --branch main --single-branch "$REPO_URL" /tmp/openoats-main

          chmod +x /tmp/openoats-main/scripts/update_homebrew_cask.sh
          /tmp/openoats-main/scripts/update_homebrew_cask.sh "$VERSION" "$SHA256"

          cd /tmp/openoats-main
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/openoats.rb
          if git diff --cached --quiet; then
            echo "No cask changes to commit"
            exit 0
          fi

          git commit -m "Update Homebrew cask for ${VERSION}"

          if git push origin main; then
            exit 0
          fi

          BRANCH="automation/homebrew-cask-${VERSION}"
          git checkout -B "$BRANCH"
          git push origin "$BRANCH" --force

          EXISTING_PR=$(gh pr list \
            --repo yazinsai/OpenOats \
            --head "$BRANCH" \
            --state open \
            --json number \
            --jq '.[0].number // empty')

          if [[ -n "$EXISTING_PR" ]]; then
            echo "Open PR #$EXISTING_PR already exists for $BRANCH"
            exit 0
          fi

          gh pr create \
            --repo yazinsai/OpenOats \
            --base main \
            --head "$BRANCH" \
            --title "Update Homebrew cask for ${VERSION}" \
            --body "Automated follow-up from the release workflow because direct pushes to protected \`main\` are blocked by branch protection."
